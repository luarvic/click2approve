server {
    listen 3333;
    location = /app {
        return 301 /app/;
    }
    location = / {
        return 301 /app/;
    }
    location /app/ {
        root /usr/share/nginx/html;
        index index.html index.htm;
        rewrite ^/app/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html =404;
    }
    location / {
        root /usr/share/nginx/html;
        index help.html;
    }
}
